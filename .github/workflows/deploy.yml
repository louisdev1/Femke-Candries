name: Deploy CV to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Build site
        run: |
          mkdir -p _site
          # Find the CV image (supports jpg, jpeg, png, webp)
          CV_IMAGE=$(ls cv/cv.* 2>/dev/null | head -1)
          IMAGE_NAME=$(basename "$CV_IMAGE")

          cat > _site/index.html << EOF
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8" />
            <meta name="viewport" content="width=device-width, initial-scale=1.0" />
            <title>CV</title>
            <style>
              *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

              html, body {
                height: 100%;
                background: #1a1a1a;
              }

              body {
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: flex-start;
                padding: 2rem 1rem 3rem;
                min-height: 100%;
              }

              .frame {
                background: #fff;
                width: 100%;
                max-width: min(900px, 100%);
                box-shadow: 0 4px 6px rgba(0,0,0,0.3), 0 20px 60px rgba(0,0,0,0.5);
              }

              .frame img {
                width: 100%;
                height: auto;
                display: block;
                /* Crisp rendering — no browser downscaling blur */
                image-rendering: -webkit-optimize-contrast;
                image-rendering: crisp-edges;
              }

              .meta {
                padding: 0.6rem 1rem;
                background: #f5f5f5;
                text-align: right;
                color: #999;
                font-size: 0.7rem;
                letter-spacing: 0.08em;
                text-transform: uppercase;
                font-family: monospace;
              }
            </style>
          </head>
          <body>
            <div class="frame">
              <img
                src="$IMAGE_NAME"
                alt="CV"
                decoding="async"
              />
              <div class="meta">Updated $(date +'%B %Y')</div>
            </div>
          </body>
          </html>
          EOF

          cp "$CV_IMAGE" _site/"$IMAGE_NAME"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
